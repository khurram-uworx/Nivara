name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal

    - name: Pack Nivara
      run: dotnet pack src/Nivara/Nivara.csproj --no-build --configuration Release

    - name: Pack Nivara.Extensions
      run: dotnet pack src/Nivara.Extensions/Nivara.Extensions.csproj --no-build --configuration Release

    - name: Push Nivara to NuGet
      run: |
        dotnet nuget push src/Nivara/bin/Release/Nivara.0.9.0.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
        dotnet nuget push src/Nivara/bin/Release/Nivara.0.9.0.snupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

    - name: Push Nivara.Extensions to NuGet
      run: |
        dotnet nuget push src/Nivara.Extensions/bin/Release/Nivara.Extensions.0.9.0.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
        dotnet nuget push src/Nivara.Extensions/bin/Release/Nivara.Extensions.0.9.0.snupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
